name: CI

# Machine-checks that the formalisation builds with zero `sorry` on a clean runner:
# lean-action installs the pinned toolchain, fetches the Mathlib olean cache
# (`lake exe cache get`) and runs `lake build`. A green run is the public
# certificate behind the "zero sorry" claim.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
